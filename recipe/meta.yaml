{% set version = "7.5.0" %}

# the `if` avoids bot duplications
{% if 1 %}
  {% set jupyterlab_min = "4.4.9" %}
  {% set jupyterlab_max = "4.5" %}
{% endif %}

package:
  name: notebook
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/notebook/notebook-{{ version }}.tar.gz
  sha256: 3b27eaf9913033c28dde92d02139414c608992e1df4b969c843219acf2ff95e4

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation --disable-pip-version-check
  entry_points:
    - jupyter-notebook = notebook.app:main

requirements:
  host:
    - hatch-jupyter-builder >=0.5
    - hatchling >=1.11
    - httpx >=0.25.0,<1.0.dev1
    - jupyterlab {{ jupyterlab_min }}
    - pip
    - python {{ python_min }}
  run:
    - jupyter_server >=2.4.0,<3
    - jupyterlab >={{ jupyterlab_min }},<{{ jupyterlab_max }}
    - jupyterlab_server >=2.27.1,<3
    - notebook-shim >=0.2,<0.3
    - python >={{ python_min }}
    - tornado >=6.2.0

test:
  requires:
    - pip
    - python {{ python_min }}
    - jupyterlab {{ jupyterlab_min }}
  imports:
    - notebook
  commands:
    - pip check
    - jupyter notebook -h
    - jupyter-notebook -h
    - jupyter labextension list --debug
    - >
      jupyter labextension list --debug 2>&1  | python -c "import sys, re; assert re.search('@jupyter-notebook/lab-extension.*OK', sys.stdin.read())"

about:
  home: https://github.com/jupyter/notebook
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE
    - notebook/labextension/static/third-party-licenses.json
    - notebook/static/third-party-licenses.json
  summary: A web-based notebook environment for interactive computing
  doc_url: https://jupyter-notebook.readthedocs.io
  doc_source_url: https://github.com/jupyter/notebook/tree/v{{ version }}/docs

extra:
  recipe-maintainers:
    - krassowski
    - SylvainCorlay
    - jakirkham
    - minrk
    - pelson
    - gnestor
    - takluyver
    - lresende
    - bollwyvl
    - blink1073
    - davidbrochart
    - jtpio
